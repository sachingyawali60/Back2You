{% load static %}
<!-- navbar.html - For Authenticated Users -->
<nav class="navbar">
    <div class="nav-container">
        <a href="{% url 'home' %}" class="nav-logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </svg>
            <span class="logo-text">Back2You</span>
        </a>

        <button class="mobile-toggle" onclick="toggleMobileMenu()" aria-label="Toggle menu">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <ul class="nav-menu" id="navMenu">
            <li><a href="{% url 'home' %}" class="nav-link">Home</a></li>
            
            <li class="nav-dropdown">
                <button class="nav-link dropdown-trigger" onclick="toggleDropdown(this)">
                    Browse
                    <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <ul class="dropdown-menu">
                    <li><a href="{% url 'lost_items' %}">Lost Items</a></li>
                    <li><a href="{% url 'found_items' %}">Found Items</a></li>
                </ul>
            </li>

            <li class="nav-dropdown">
                <button class="nav-link dropdown-trigger" onclick="toggleDropdown(this)">
                    My Activity
                    <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <ul class="dropdown-menu">
                    <li><a href="{% url 'my_item' %}">My Posts</a></li>
                    <li><a href="{% url 'my_claims' %}">My Claims</a></li>
                    <li><a href="{% url 'manage_claims' %}">Manage Claims</a></li>
                </ul>
            </li>

            <li><a href="{% url 'about' %}" class="nav-link">About</a></li>

            <li class="nav-post">
                <a href="{% url 'add_item' %}" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Post Item
                </a>
            </li>

            <li class="nav-dropdown user-dropdown">
                <button class="user-trigger" onclick="toggleDropdown(this)">
                    <span class="user-avatar">{{ user.username|slice:":1"|upper }}</span>
                    <span class="user-name">{{ user.username }}</span>
                    <svg class="dropdown-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <ul class="dropdown-menu dropdown-menu-right">
                    <li><a href="{% url 'profile' %}">My Profile</a></li>
                    <li class="dropdown-divider"></li>
                    <li>
                        <form action="{% url 'logout' %}" method="POST">
                            {% csrf_token %}
                            <button type="submit" class="logout-btn">Sign Out</button>
                        </form>
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</nav>

<div class="nav-overlay" id="navOverlay" onclick="toggleMobileMenu()"></div>

<style>
.navbar {
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.nav-container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
}

.nav-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: #0f766e;
    font-weight: 700;
    font-size: 1.25rem;
}

.logo-icon {
    width: 24px;
    height: 24px;
}

.nav-menu {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    list-style: none;
    margin: 0;
    padding: 0;
}

.nav-link {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.5rem 0.875rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #374151;
    text-decoration: none;
    border-radius: 0.375rem;
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
}

.nav-link:hover {
    background: #f3f4f6;
    color: #0f766e;
}

.dropdown-arrow {
    width: 14px;
    height: 14px;
    transition: transform 0.2s;
}

.nav-dropdown {
    position: relative;
}

.dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 0.5rem;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    padding: 0.5rem 0;
    min-width: 180px;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-8px);
    transition: all 0.2s;
    list-style: none;
    margin-top: 0.5rem;
}

.dropdown-menu-right {
    left: auto;
    right: 0;
}

.nav-dropdown:hover .dropdown-menu,
.nav-dropdown.active .dropdown-menu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.nav-dropdown:hover .dropdown-arrow,
.nav-dropdown.active .dropdown-arrow {
    transform: rotate(180deg);
}

.dropdown-menu li a,
.dropdown-menu li button {
    display: block;
    width: 100%;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    color: #374151;
    text-decoration: none;
    text-align: left;
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
}

.dropdown-menu li a:hover,
.dropdown-menu li button:hover {
    background: #f3f4f6;
    color: #0f766e;
}

.dropdown-divider {
    height: 1px;
    background: #e5e7eb;
    margin: 0.5rem 0;
}

.user-trigger {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.375rem 0.75rem;
    background: none;
    border: 1px solid #e5e7eb;
    border-radius: 9999px;
    cursor: pointer;
    transition: all 0.2s;
}

.user-trigger:hover {
    background: #f9fafb;
    border-color: #d1d5db;
}

.user-avatar {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-size: 0.75rem;
    font-weight: 600;
}

.user-name {
    font-size: 0.875rem;
    font-weight: 500;
    color: #374151;
}

.logout-btn {
    color: #dc2626 !important;
}

.logout-btn:hover {
    background: #fef2f2 !important;
    color: #dc2626 !important;
}

.nav-post {
    margin-left: 0.5rem;
}

.mobile-toggle {
    display: none;
    padding: 0.5rem;
    background: none;
    border: none;
    cursor: pointer;
    color: #374151;
}

.menu-icon {
    width: 24px;
    height: 24px;
}

.nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
}

.nav-overlay.active {
    display: block;
}

@media (max-width: 1024px) {
    .mobile-toggle {
        display: block;
    }

    .nav-menu {
        position: fixed;
        top: 64px;
        right: -100%;
        width: 280px;
        height: calc(100vh - 64px);
        background: #ffffff;
        flex-direction: column;
        align-items: stretch;
        padding: 1rem;
        gap: 0.25rem;
        box-shadow: -4px 0 10px rgba(0, 0, 0, 0.1);
        transition: right 0.3s ease;
        overflow-y: auto;
    }

    .nav-menu.active {
        right: 0;
    }

    .nav-link {
        justify-content: space-between;
    }

    .dropdown-menu {
        position: static;
        opacity: 1;
        visibility: visible;
        transform: none;
        box-shadow: none;
        border: none;
        background: #f9fafb;
        margin: 0.25rem 0;
        display: none;
        border-radius: 0.375rem;
    }

    .nav-dropdown.active .dropdown-menu {
        display: block;
    }

    .nav-post {
        margin-left: 0;
        margin-top: 0.5rem;
    }

    .nav-post .btn {
        width: 100%;
        justify-content: center;
    }

    .user-dropdown {
        border-top: 1px solid #e5e7eb;
        padding-top: 0.75rem;
        margin-top: 0.5rem;
    }

    .user-trigger {
        width: 100%;
        justify-content: flex-start;
    }
}
</style>

<script>
function toggleMobileMenu() {
    document.getElementById('navMenu').classList.toggle('active');
    document.getElementById('navOverlay').classList.toggle('active');
}

function toggleDropdown(element) {
    if (window.innerWidth <= 1024) {
        element.closest('.nav-dropdown').classList.toggle('active');
    }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        document.getElementById('navMenu').classList.remove('active');
        document.getElementById('navOverlay').classList.remove('active');
    }
});
</script>
