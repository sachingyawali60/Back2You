{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Item - Back2You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        body {
            background: #f9fafb;
            min-height: 100vh;
        }

        .main-content {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-card {
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            text-align: center;
            width: 100%;
        }

        .delete-icon {
            width: 80px;
            height: 80px;
            background: #fef2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .delete-icon svg {
            width: 40px;
            height: 40px;
            color: #dc2626;
        }

        .delete-card h1 {
            font-size: 1.5rem;
            color: #111827;
            margin-bottom: 0.75rem;
        }

        .delete-card p {
            color: #6b7280;
            margin-bottom: 0.5rem;
            font-size: 0.9375rem;
        }

        .item-name {
            font-weight: 600;
            color: #111827;
            background: #f3f4f6;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
            font-size: 1rem;
        }

        .warning-text {
            color: #dc2626;
            font-size: 0.8125rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .warning-text svg {
            width: 16px;
            height: 16px;
        }

        .button-group {
            display: flex;
            gap: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            flex: 1;
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        .btn-danger {
            background: #dc2626;
            color: #ffffff;
        }

        .btn-danger:hover {
            background: #b91c1c;
            color: #ffffff;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #e5e7eb;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
            color: #1f2937;
        }

        @media (max-width: 480px) {
            .button-group {
                flex-direction: column;
            }

            .btn-secondary {
                order: 1;
            }
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="delete-card">
            <div class="delete-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            </div>

            <h1>Delete Item</h1>
            <p>Are you sure you want to delete this item?</p>
            
            <div class="item-name">{{ item.title }}</div>

            <div class="warning-text">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                This action cannot be undone
            </div>

            <form method="POST">
                {% csrf_token %}
                <div class="button-group">
                    <button type="submit" class="btn btn-danger">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Yes, Delete
                    </button>
                    <a href="{% url 'my_item' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
