{% load static %}
<!-- navbar_nouser.html - For Guest/Non-Authenticated Users -->

<div class="guest-banner">
    <div class="guest-banner-content">
        <span>Welcome! Create an account to post and claim items.</span>
        <a href="{% url 'register' %}" class="guest-banner-link">Get Started</a>
    </div>
</div>

<nav class="navbar">
    <div class="nav-container">
        <a href="{% url 'home' %}" class="nav-logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </svg>
            <span class="logo-text">Back2You</span>
        </a>

        <button class="mobile-toggle" onclick="toggleGuestMenu()" aria-label="Toggle menu">
            <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <ul class="nav-menu" id="guestNavMenu">
            <li><a href="{% url 'home' %}" class="nav-link">Home</a></li>
            <li><a href="{% url 'lost_items' %}" class="nav-link">Lost Items</a></li>
            <li><a href="{% url 'found_items' %}" class="nav-link">Found Items</a></li>
            <li><a href="{% url 'about' %}" class="nav-link">About</a></li>
            <li class="nav-auth">
                <a href="{% url 'login' %}" class="btn btn-secondary">Sign In</a>
                <a href="{% url 'register' %}" class="btn btn-primary">Register</a>
            </li>
        </ul>
    </div>
</nav>

<div class="nav-overlay" id="guestNavOverlay" onclick="toggleGuestMenu()"></div>

<style>
.guest-banner {
    background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
    color: #ffffff;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
}

.guest-banner-content {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    flex-wrap: wrap;
}

.guest-banner-link {
    color: #ffffff;
    font-weight: 600;
    text-decoration: underline;
    text-underline-offset: 2px;
}

.guest-banner-link:hover {
    color: #ffffff;
    opacity: 0.9;
}

.navbar {
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    position: sticky;
    top: 0;
    z-index: 1000;
}

.nav-container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
}

.nav-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: #0f766e;
    font-weight: 700;
    font-size: 1.25rem;
}

.logo-icon {
    width: 24px;
    height: 24px;
}

.nav-menu {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    list-style: none;
    margin: 0;
    padding: 0;
}

.nav-link {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.5rem 0.875rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: #374151;
    text-decoration: none;
    border-radius: 0.375rem;
    transition: all 0.2s;
}

.nav-link:hover {
    background: #f3f4f6;
    color: #0f766e;
}

.nav-auth {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-left: 0.5rem;
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    font-size: 0.875rem;
    font-weight: 500;
    border-radius: 0.375rem;
    text-decoration: none;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
}

.btn-primary {
    background: #0f766e;
    color: #ffffff;
}

.btn-primary:hover {
    background: #0d5d56;
    color: #ffffff;
}

.btn-secondary {
    background: #f3f4f6;
    color: #374151;
    border: 1px solid #e5e7eb;
}

.btn-secondary:hover {
    background: #e5e7eb;
    color: #1f2937;
}

.mobile-toggle {
    display: none;
    padding: 0.5rem;
    background: none;
    border: none;
    cursor: pointer;
    color: #374151;
}

.menu-icon {
    width: 24px;
    height: 24px;
}

.nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
}

.nav-overlay.active {
    display: block;
}

@media (max-width: 768px) {
    .mobile-toggle {
        display: block;
    }

    .nav-menu {
        position: fixed;
        top: 64px;
        right: -100%;
        width: 280px;
        height: calc(100vh - 64px);
        background: #ffffff;
        flex-direction: column;
        align-items: stretch;
        padding: 1rem;
        gap: 0.25rem;
        box-shadow: -4px 0 10px rgba(0, 0, 0, 0.1);
        transition: right 0.3s ease;
        overflow-y: auto;
    }

    .nav-menu.active {
        right: 0;
    }

    .nav-auth {
        flex-direction: column;
        margin-left: 0;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid #e5e7eb;
    }

    .nav-auth .btn {
        width: 100%;
        justify-content: center;
    }

    .guest-banner-content {
        flex-direction: column;
        text-align: center;
        gap: 0.25rem;
    }
}
</style>

<script>
function toggleGuestMenu() {
    document.getElementById('guestNavMenu').classList.toggle('active');
    document.getElementById('guestNavOverlay').classList.toggle('active');
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        document.getElementById('guestNavMenu').classList.remove('active');
        document.getElementById('guestNavOverlay').classList.remove('active');
    }
});
</script>
